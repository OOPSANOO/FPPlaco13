
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SARL BATISYSTÈME · PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #6366f1;
            --text: #f1f5f9; --text-dim: #94a3b8; --success: #22c55e; --warning: #fbbf24;
        }
        body.light-mode { --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --text-dim: #64748b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; font-size: 13px; transition: 0.3s; }
        .app-container { max-width: 800px; margin: auto; padding: 10px; padding-bottom: 80px; }
        
        /* تعديل الهيدر ليصبح كشريط تطبيق متناسق للموبايل */
        header { 
            background: linear-gradient(135deg, #6366f1, #a855f7); 
            padding: 15px 20px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 15px; 
            color: white; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* أزرار التحكم في الهيدر العلوي */
        .header-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }
        .header-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        .theme-toggle-top { right: 15px; }
        .facebook-btn-top { left: 15px; }

        .dimensions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .input-group label { font-size: 10px; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .input-group input { width: 100%; background: rgba(0,0,0,0.1); border: 1px solid #334155; color: var(--text); font-size: 14px; font-weight: 700; padding: 8px; border-radius: 6px; text-align: center; }
        .tools-bar { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px; }
        .search-box { position: relative; }
        .search-box input { width: 100%; padding: 10px 35px 10px 10px; border-radius: 8px; border: 1px solid #334155; background: var(--surface); color: var(--text); }
        .search-box i { position: absolute; right: 12px; top: 12px; color: var(--text-dim); }
        .toggle-mode { background: var(--surface); display: flex; border-radius: 8px; padding: 4px; border: 1px solid #334155; }
        .toggle-btn { flex: 1; padding: 6px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.3s; }
        .toggle-btn.active { background: var(--accent); color: white; }
        .table-scroll { overflow-x: auto; background: var(--surface); border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.05); padding: 12px; text-align: right; font-size: 11px; color: var(--text-dim); border-bottom: 2px solid rgba(0,0,0,0.1); }
        td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .cost-summary { background: var(--surface); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; margin-top: 10px; border: 2px solid var(--accent); }
        .val { font-size: 20px; font-weight: 800; color: var(--warning); }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .edit-input { width: 65px; padding: 5px; background: rgba(0,0,0,0.05); border: 1px solid #334155; color: var(--success); text-align: center; border-radius: 4px; font-weight: 700; }
        .active-qty { background: rgba(34, 197, 94, 0.1) !important; }
        
        /* ستايل ورقة الطباعة والحفظ الاحترافية باللون الأبيض الناصع وبدون تشويه */
        .print-invoice-sheet {
            background: #ffffff !important;
            color: #1e293b !important;
            padding: 30px !important;
            box-sizing: border-box;
            width: 750px;
            font-family: 'Cairo', sans-serif;
        }
        .print-invoice-sheet .sheet-header {
            text-align: center;
            border-bottom: 3px double #6366f1;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .print-invoice-sheet .sheet-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 15px;
        }
        .print-invoice-sheet table {
            width: 100%;
            border-collapse: collapse;
        }
        .print-invoice-sheet th {
            background: #f1f5f9 !important;
            color: #1e293b !important;
            border: 1px solid #cbd5e1 !important;
            padding: 10px !important;
            font-weight: 700;
        }
        .print-invoice-sheet td {
            border: 1px solid #e2e8f0 !important;
            padding: 10px !important;
            color: #334155 !important;
            background: #ffffff !important;
        }
        .print-invoice-sheet .sheet-summary {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc !important;
            border: 2px solid #6366f1 !important;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="app-container" id="mainAppContent">
    <header class="no-print">
        <button class="header-btn theme-toggle-top" onclick="toggleTheme()">
            <i class="fas fa-sun" id="themeIcon"></i>
        </button>

        <div style="font-size: 10px; font-weight: 700; letter-spacing: 2px;">BY OOPSANOO</div>
        <h1 style="font-size: 20px; margin-top: 2px;">SARL BATISYSTÈME</h1>

        <a href="https://www.facebook.com/abdelhamid31.mansouri31?mibextid=ZbWKwL" target="_blank" class="header-btn facebook-btn-top">
            <i class="fab fa-facebook-f"></i>
        </a>
    </header>

    <div class="dimensions-grid">
        <div class="input-group"><label>الطول (م)</label><input type="number" id="inputLen" oninput="syncDimensions('dim')"></div>
        <div class="input-group"><label>العرض (م)</label><input type="number" id="inputWid" oninput="syncDimensions('dim')"></div>
        <div class="input-group"><label>المساحة (م²)</label><input type="number" id="areaInput" value="100" class="highlight-input" oninput="syncDimensions('area')"></div>
    </div>

    <div class="tools-bar no-print">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="بحث عن مادة..." oninput="render()">
        </div>
        <div class="toggle-mode" onclick="toggleProjectMode()">
            <div id="btnSimple" class="toggle-btn active">بسيط</div>
            <div id="btnDecor" class="toggle-btn">ديكور</div>
        </div>
    </div>

    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th>المادة</th>
                    <th>السعر (دج)</th>
                    <th>الكمية</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="cost-summary">
        <div>
            <div style="font-size: 11px; color: var(--text-dim);">إجمالي التكلفة</div>
            <div class="val" id="grandTotal">0 دج</div>
        </div>
        <div style="text-align: left;">
            <div style="font-size: 11px; color: var(--text-dim);">المتوسط / م²</div>
            <div class="val" id="avgPrice" style="color: var(--success); font-size: 16px;">0 دج</div>
        </div>
    </div>

    <div class="actions no-print">
        <button class="btn" style="background:#ef4444" onclick="generatePerfectPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn" style="background:#6366f1" onclick="saveData()"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn" style="background:#10b981" onclick="generatePerfectPDF()"><i class="fas fa-print"></i> طباعة</button>
    </div>

    <div class="project-info">
        <div class="field full-width">
            <input type="text" id="pName" placeholder="اسم المشروع / الزبون" style="width:100%; padding:10px; border-radius:8px; background:var(--surface); border:1px solid #334155; color:var(--text);">
        </div>
        <div class="field"><input type="date" id="pDate" style="width:100%; padding:10px; border-radius:8px; background:var(--surface); border:1px solid #334155; color:var(--text);"></div>
        <div class="field"><input type="text" id="pLoc" placeholder="الموقع" style="width:100%; padding:10px; border-radius:8px; background:var(--surface); border:1px solid #334155; color:var(--text);"></div>
    </div>
</div>

<script>
    let isDecorMode = false;
    let items = [
        { id: "ks_plate", name: "صفيحة KS BA13", p: 1180, options: [{ label: "صفيحة KS BA13", price: 1180 }, { label: "صفيحة KH BA13", price: 1680 }], currentOpt: 0, c_simple: 0.28, c_decor: 0.35 },
        { id: "f47", name: "F47 5.3ML", p: 73, options: [{ label: "F47 3ML", div: 3 }, { label: "F47 4ML", div: 4 }, { label: "F47 5.3ML", div: 5.3 }], currentOpt: 2 },
        { id: "cr2", name: "CR2 Cornière", p: 60, c_simple: 0.17, c_decor: 0.25 },
        { id: "cheville", name: "CHEVILLE A FRAPPE", p: 4, c_simple: 1.5, c_decor: 2.5 },
        { id: "suspente", name: "Suspente Pivot", p: 11, c_simple: 1.8, c_decor: 2.8 },
        { id: "cheville_laiton", name: "CHEVILLE LAITON M6", p: 25, c_simple: 1.8, c_decor: 2.8 },
        { id: "tige", name: "Tige Filetée", p: 39, c_simple: 1.8, c_decor: 2.8 },
        { id: "vis", name: "Vis 25mm (U)", p: 0.52, c_simple: 12, c_decor: 18 },
        { id: "bande", name: "Bande à joint", p: 4.5, c_simple: 1.5, c_decor: 2.2 },
        { id: "enduit", name: "Enduit 25kg", p: 55, c_simple: 0.35, c_decor: 0.5 }
    ];

    function toggleItem(index) {
        const item = items[index];
        if (item.id === "ks_plate" || item.id === "f47") {
            item.currentOpt = (item.currentOpt + 1) % item.options.length;
            if (item.id === "ks_plate") item.p = item.options[item.currentOpt].price;
            render();
        }
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        items.forEach((item, i) => {
            const isToggleable = item.id === 'f47' || item.id === 'ks_plate';
            const displayName = isToggleable ? item.options[item.currentOpt].label : item.name;
            
            if (displayName.toLowerCase().includes(searchTerm)) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td onclick="${isToggleable ? `toggleItem(${i})` : ''}" style="${isToggleable ? 'cursor:pointer; color:var(--accent); font-weight:800;' : ''}">
                        ${displayName} ${isToggleable ? '🔄' : ''}
                    </td>
                    <td><input type="number" class="edit-input" id="p-${i}" value="${item.p}" oninput="updatePrice(${i}, this.value)"></td>
                    <td><input type="number" class="edit-input" id="q-${i}" readonly></td>
                    <td id="t-${i}" style="font-weight:700">0</td>
                `;
                tbody.appendChild(tr);
            }
        });
        calculate();
    }

    function updatePrice(index, val) {
        items[index].p = parseFloat(val) || 0;
        calculate();
    }

    function calculate() {
        const area = parseFloat(document.getElementById('areaInput').value) || 0;
        let total = 0;

        items.forEach((item, i) => {
            const qInput = document.getElementById(`q-${i}`);
            if (!qInput) return;

            let rawQ = 0;
            const coeff = isDecorMode ? (item.c_decor || 0) : (item.c_simple || 0);

            if (item.id === "ks_plate") rawQ = area / 3.6;
            else if (item.id === "f47") {
                const multiplier = isDecorMode ? 2.5 : 2;
                rawQ = (area * multiplier) / item.options[item.currentOpt].div;
            }
            else rawQ = coeff * area;

            const finalQ = Math.ceil(rawQ);
            qInput.value = finalQ;
            if (area > 0) qInput.classList.add('active-qty');

            const sub = item.p * finalQ;
            document.getElementById(`t-${i}`).innerText = Math.round(sub).toLocaleString();
            total += sub;
        });

        document.getElementById('grandTotal').innerText = Math.round(total).toLocaleString() + " دج";
        document.getElementById('avgPrice').innerText = area > 0 ? Math.round(total/area).toLocaleString() + " دج" : "0 دج";
    }

    function toggleProjectMode() {
        isDecorMode = !isDecorMode;
        document.getElementById('btnSimple').classList.toggle('active');
        document.getElementById('btnDecor').classList.toggle('active');
        calculate();
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('themeIcon');
        if(document.body.classList.contains('light-mode')) {
            icon.className = 'fas fa-moon';
        } else {
            icon.className = 'fas fa-sun';
        }
    }

    function syncDimensions(type) {
        const l = parseFloat(document.getElementById('inputLen').value) || 0;
        const w = parseFloat(document.getElementById('inputWid').value) || 0;
        if (type === 'dim' && l > 0 && w > 0) document.getElementById('areaInput').value = (l * w).toFixed(2);
        calculate();
    }

    function generatePerfectPDF() {
        const pName = document.getElementById('pName').value || "غير محدد";
        const pDate = document.getElementById('pDate').value || new Date().toLocaleDateString('ar-DZ');
        const pLoc = document.getElementById('pLoc').value || "غير محدد";
        const len = document.getElementById('inputLen').value || "-";
        const wid = document.getElementById('inputWid').value || "-";
        const area = document.getElementById('areaInput').value || "0";
        const gTotal = document.getElementById('grandTotal').innerText;
        const avgPrice = document.getElementById('avgPrice').innerText;

        let tableRowsHTML = '';
        items.forEach((item, i) => {
            const displayName = (item.id === 'f47' || item.id === 'ks_plate') ? item.options[item.currentOpt].label : item.name;
            const price = item.p;
            const qty = document.getElementById(`q-${i}`) ? document.getElementById(`q-${i}`).value : 0;
            const total = document.getElementById(`t-${i}`) ? document.getElementById(`t-${i}`).innerText : 0;
            
            tableRowsHTML += `
                <tr>
                    <td style="text-align: right; font-weight: 600;">${displayName}</td>
                    <td style="text-align: center;">${price.toLocaleString()} دج</td>
                    <td style="text-align: center; font-weight: bold;">${qty}</td>
                    <td style="text-align: left; font-weight: bold; color: #1e293b;">${total} دج</td>
                </tr>
            `;
        });

        const reportDiv = document.createElement('div');
        reportDiv.className = 'print-invoice-sheet';
        reportDiv.id = 'temporaryInvoiceSheet';
        
        reportDiv.innerHTML = `
            <div class="sheet-header" style="direction: rtl;">
                <div style="font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #6366f1;">BY OOPSANOO</div>
                <h1 style="font-size: 26px; margin: 5px 0; color: #1e293b;">SARL BATISYSTÈME</h1>
            </div>

            <div class="sheet-meta" style="direction: rtl;">
                <div><strong>المشروع / الزبون:</strong> ${pName}</div>
                <div><strong>التاريخ:</strong> ${pDate}</div>
                <div><strong>الموقع:</strong> ${pLoc}</div>
                <div><strong>المقاسات:</strong> الطول: ${len} م | العرض: ${wid} م | المساحة: ${area} م²</div>
            </div>

            <table style="direction: rtl;">
                <thead>
                    <tr>
                        <th style="text-align: right;">المادة</th>
                        <th style="text-align: center;">السعر (دج)</th>
                        <th style="text-align: center;">الكمية</th>
                        <th style="text-align: left;">الإجمالي</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableRowsHTML}
                </tbody>
            </table>

            <div class="sheet-summary" style="direction: rtl;">
                <div>
                    <span style="font-size: 12px; color: #64748b; display: block;">إجمالي تكلفة المواد</span>
                    <strong style="font-size: 22px; color: #1e293b;">${gTotal}</strong>
                </div>
                <div style="text-align: left;">
                    <span style="font-size: 12px; color: #64748b; display: block;">المتوسط التقريبي / م²</span>
                    <strong style="font-size: 18px; color: #22c55e;">${avgPrice}</strong>
                </div>
            </div>
        `;

        const mainApp = document.getElementById('mainAppContent');
        mainApp.style.display = 'none';
        document.body.appendChild(reportDiv);

        const opt = {
            margin:       [10, 10, 10, 10],
            filename:     `BATISYSTEME_${pName.trim().replace(/\s+/g, '_')}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { 
                scale: 2, 
                useCORS: true,
                width: 750,
                windowWidth: 750
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(reportDiv).save().then(() => {
            document.body.removeChild(reportDiv);
            mainApp.style.display = 'block';
            render();
        }).catch((err) => {
            console.error(err);
            if(document.getElementById('temporaryInvoiceSheet')) {
                document.body.removeChild(reportDiv);
            }
            mainApp.style.display = 'block';
        });
    }

    function saveData() {
        const data = { prices: items.map(item => ({id: item.id, p: item.p})), projectName: document.getElementById('pName').value, location: document.getElementById('pLoc').value };
        localStorage.setItem('sarlData', JSON.stringify(data));
        alert('✅ تم حفظ البيانات والأسعار بنجاح');
    }

    function loadSavedData() {
        const saved = localStorage.getItem('sarlData');
        if (saved) {
            const data = JSON.parse(saved);
            data.prices.forEach(pObj => {
                const item = items.find(it => it.id === pObj.id);
                if (item) item.p = pObj.p;
            });
            document.getElementById('pName').value = data.projectName || '';
            document.getElementById('pLoc').value = data.location || '';
        }
    }

    window.onload = () => {
        document.getElementById('pDate').valueAsDate = new Date();
        loadSavedData();
        render();
    };
</script>
</body>
</html>
